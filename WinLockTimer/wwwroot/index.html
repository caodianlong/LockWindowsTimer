<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WinLockTimer 家长控制程序 - Web 远程管理面板">
    <title>WinLockTimer - 远程控制面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ============ 认证页面 ============ -->
    <div id="auth-page" class="page">
        <div class="auth-container">
            <div class="auth-card glass-card">
                <div class="auth-icon">
                    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="32" cy="32" r="28" stroke="url(#grad1)" stroke-width="3" fill="none"/>
                        <path d="M32 16 L32 32 L44 38" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6C63FF"/>
                                <stop offset="100%" style="stop-color:#3B82F6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="auth-title">WinLockTimer</h1>
                <p class="auth-subtitle">远程控制面板</p>
                <div class="auth-form">
                    <div class="input-group">
                        <label for="token-input">Access Token</label>
                        <div class="input-wrapper">
                            <input type="password" id="token-input" placeholder="请输入 Access Token" autocomplete="off" spellcheck="false">
                            <button id="toggle-password" class="toggle-btn" type="button" title="显示/隐藏">
                                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg id="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                    <div id="auth-error" class="error-message" style="display:none"></div>
                    <button id="auth-submit" class="btn btn-primary btn-full">
                        <span class="btn-text">验证登录</span>
                        <span class="btn-loader" style="display:none"></span>
                    </button>
                </div>
                <p class="auth-hint">Token 可在桌面程序的设置中查看</p>
            </div>
        </div>
    </div>

    <!-- ============ 主控面板 ============ -->
    <div id="main-page" class="page" style="display:none">
        <!-- 顶部导航 -->
        <header class="navbar">
            <div class="navbar-brand">
                <svg class="navbar-icon" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="2"/><path d="M16 8 L16 16 L22 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                <span>WinLockTimer</span>
            </div>
            <nav class="navbar-nav">
                <button class="nav-btn active" data-page="dashboard" id="nav-dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                    <span>控制台</span>
                </button>
                <button class="nav-btn" data-page="history" id="nav-history">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>历史记录</span>
                </button>
            </nav>
            <button class="nav-btn logout-btn" id="logout-btn" title="退出登录">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </header>

        <!-- 控制台页面 -->
        <main id="dashboard-view" class="main-content">
            <div class="dashboard-grid">
                <!-- 倒计时显示卡片 -->
                <div class="card glass-card timer-card">
                    <div class="card-header">
                        <h2>倒计时</h2>
                        <span id="timer-status-badge" class="status-badge status-idle">待机</span>
                    </div>
                    <div class="timer-display">
                        <div id="timer-ring" class="timer-ring">
                            <svg viewBox="0 0 200 200">
                                <circle cx="100" cy="100" r="90" class="ring-bg"/>
                                <circle cx="100" cy="100" r="90" class="ring-progress" id="ring-progress"
                                    stroke-dasharray="565.48" stroke-dashoffset="0"/>
                            </svg>
                            <div class="timer-text">
                                <span id="timer-remaining" class="timer-digits">00:00:00</span>
                                <span id="timer-status-text" class="timer-label">准备设置时间</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 控制卡片 -->
                <div class="card glass-card control-card">
                    <div class="card-header">
                        <h2>控制面板</h2>
                    </div>
                    <div class="control-content">
                        <!-- 时间设置 -->
                        <div class="time-setting">
                            <label>设置时间</label>
                            <div class="time-inputs">
                                <div class="time-input-group">
                                    <input type="number" id="input-hours" min="0" max="23" value="0">
                                    <span>时</span>
                                </div>
                                <div class="time-separator">:</div>
                                <div class="time-input-group">
                                    <input type="number" id="input-minutes" min="0" max="59" value="30">
                                    <span>分</span>
                                </div>
                            </div>
                        </div>

                        <!-- 账户选择 -->
                        <div class="account-select">
                            <label for="select-account">选择账户</label>
                            <select id="select-account">
                                <option value="-1">无 / 默认</option>
                            </select>
                        </div>

                        <!-- 控制按钮 -->
                        <div class="control-buttons">
                            <button id="btn-start" class="btn btn-success">
                                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                <span>开始</span>
                            </button>
                            <button id="btn-pause" class="btn btn-warning" disabled>
                                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                <span>暂停</span>
                            </button>
                            <button id="btn-reset" class="btn btn-danger" disabled>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                                <span>重置</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 信息卡片 -->
                <div class="card glass-card info-card">
                    <div class="card-header">
                        <h2>状态信息</h2>
                    </div>
                    <div class="info-content">
                        <div class="info-item">
                            <span class="info-label">运行状态</span>
                            <span id="info-state" class="info-value">待机</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">总时长</span>
                            <span id="info-total" class="info-value">--:--:--</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">当前账户</span>
                            <span id="info-account" class="info-value">无</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Windows状态</span>
                            <span id="info-windows-session" class="info-value">已解锁</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">进度</span>
                            <div class="progress-bar">
                                <div id="info-progress" class="progress-fill" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 历史记录页面 -->
        <main id="history-view" class="main-content" style="display:none">
            <div class="history-container">
                <div class="card glass-card">
                    <div class="card-header">
                        <h2>使用历史</h2>
                    </div>
                    <div class="history-filters">
                        <div class="filter-group">
                            <label for="filter-start">开始日期</label>
                            <input type="date" id="filter-start">
                        </div>
                        <div class="filter-group">
                            <label for="filter-end">结束日期</label>
                            <input type="date" id="filter-end">
                        </div>
                        <div class="filter-group">
                            <label for="filter-account">账户</label>
                            <select id="filter-account">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <button id="btn-query" class="btn btn-primary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <span>查询</span>
                        </button>
                    </div>
                    <div class="table-wrapper">
                        <table id="history-table" class="data-table">
                            <thead>
                                <tr>
                                    <th>用户名</th>
                                    <th>开始时间</th>
                                    <th>结束时间</th>
                                    <th>时长</th>
                                </tr>
                            </thead>
                            <tbody id="history-tbody">
                                <tr class="empty-row">
                                    <td colspan="4">暂无记录</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 密码验证模态框 -->
    <div id="password-modal" class="modal-overlay" style="display:none">
        <div class="modal-card glass-card">
            <h3 class="modal-title">🔒 家长密码验证</h3>
            <p id="modal-action-text" class="modal-desc">请输入家长密码以执行此操作</p>
            <div class="input-group" style="margin-bottom: 1rem;">
                <div class="input-wrapper">
                    <input type="password" id="modal-password-input" placeholder="请输入家长密码" autocomplete="off">
                </div>
            </div>
            <div id="modal-error" class="error-message" style="display:none"></div>
            <div class="modal-buttons">
                <button id="modal-cancel" class="btn btn-secondary">取消</button>
                <button id="modal-confirm" class="btn btn-primary">
                    <span class="btn-text">确认</span>
                    <span class="btn-loader" style="display:none"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
